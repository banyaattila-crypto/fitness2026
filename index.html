<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Body Fitness 2026 v2</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#020810;--bg2:#040e1c;--bg3:#081626;--card:#050d18;
  --border:#0f2038;--bord-g:#6b4f00;
  --gold:#F5C518;--gold2:#FF9800;--gold3:#FF6F00;
  --blue:#1E88E5;--cyan:#00BCD4;--green:#00E676;--coral:#FF5252;
  --text:#E8F0FE;--text2:#3D6080;
  --gg:linear-gradient(135deg,#F5C518,#FF9800);
  --gb:linear-gradient(135deg,#1E88E5,#00BCD4);
  --gh:linear-gradient(135deg,#F5C518 0%,#FF9800 45%,#1E88E5 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{padding-bottom:72px}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bord-g);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 20px rgba(245,197,24,.12)}
.hdr-text h1{font-size:15px;font-weight:900;background:var(--gh);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.8px}
.hdr-text p{font-size:10px;color:var(--text2);margin-top:3px;letter-spacing:.3px}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nbtn{flex:1;padding:9px 4px 7px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.nbtn.active{color:var(--gold)}
.nbtn.active i{filter:drop-shadow(0 0 6px rgba(245,197,24,.6))}
.nbtn i{font-size:18px;display:block}
.nbtn span{font-size:9px;display:block;margin-top:2px;font-weight:600}

/* SECTIONS */
.sec{display:none;padding:14px}
.sec.active{display:block}
.sec-title{font-size:20px;font-weight:900;margin-bottom:16px}
.sec-title em{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}

/* WEEK TABS */
.wtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.wtabs::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .2s}
.wtab.active{background:var(--gg);color:#000;border-color:transparent;box-shadow:0 2px 12px rgba(245,197,24,.35)}

/* PHASE INFO */
.phase-info{border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;font-weight:600;
  background:linear-gradient(135deg,rgba(245,197,24,.1),rgba(255,152,0,.08));
  border:1px solid var(--bord-g);color:var(--gold)}

/* DAY CARDS */
.dcard{border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;
  background:linear-gradient(180deg,var(--bg3) 0%,var(--card) 100%)}
.dhdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .2s}
.dhdr:active{background:rgba(245,197,24,.05)}
.dname{font-size:14px;font-weight:800}
.dright{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.dbadge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:800;letter-spacing:.5px}
.dbadge.edzes{background:var(--gg);color:#000}
.dbadge.piheno{background:var(--border);color:var(--text2)}
.dkcal{font-size:12px;font-weight:800;background:var(--gb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dprot{font-size:12px;font-weight:700;color:var(--gold)}
.dcaret{color:var(--text2);font-size:12px;transition:transform .25s}
.dcontent{display:none;padding:0 12px 12px}

/* MEAL ITEMS */
.mitem{background:var(--bg2);border-radius:10px;margin-bottom:7px;overflow:hidden;border:1px solid transparent;transition:border-color .2s}
.mitem:last-child{margin-bottom:0}
.mhdr{padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.mleft h4{font-size:13px;font-weight:800}
.mlabel{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold2);margin-bottom:2px;display:block}
.mleft p{font-size:11px;color:var(--text2);margin-top:1px}
.mright{text-align:right;flex-shrink:0;margin-left:10px}
.mkcal{font-size:13px;font-weight:800;background:var(--gb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mmacro{font-size:10px;color:var(--text2)}
.mdetail{display:none;padding:8px 12px 12px;border-top:1px solid var(--border)}
.ming-list{margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px}
.ming{font-size:11px;background:var(--bg3);padding:4px 9px;border-radius:8px;color:var(--text2);border:1px solid var(--border)}
.mrec{font-size:11px;color:var(--text);line-height:1.8;white-space:pre-line}
.shake-item{border:1px solid rgba(245,197,24,.3)!important;background:rgba(245,197,24,.05)!important}

/* TRAINING */
.tcard{border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;
  background:linear-gradient(180deg,var(--bg3) 0%,var(--card) 100%)}
.thdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.tfocus{font-size:14px;font-weight:800}
.ttag{font-size:10px;padding:4px 10px;border-radius:8px;font-weight:800;letter-spacing:.3px}
.ttag.push{background:linear-gradient(135deg,rgba(30,136,229,.3),rgba(0,188,212,.2));color:var(--cyan);border:1px solid rgba(0,188,212,.3)}
.ttag.pull{background:linear-gradient(135deg,rgba(0,188,212,.3),rgba(0,230,118,.2));color:var(--green);border:1px solid rgba(0,230,118,.3)}
.ttag.shoulders{background:linear-gradient(135deg,rgba(245,197,24,.3),rgba(255,152,0,.2));color:var(--gold);border:1px solid var(--bord-g)}
.ttag.legs{background:linear-gradient(135deg,rgba(0,230,118,.3),rgba(0,188,212,.2));color:var(--green);border:1px solid rgba(0,230,118,.3)}
.ttag.rest{background:var(--border);color:var(--text2);border:1px solid var(--border)}
.tcontent{display:none;padding:0 12px 12px}
.twu{font-size:11px;color:var(--text2);margin:8px 0 12px;line-height:1.7;padding:8px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--gold2)}
.exrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.exrow:last-child{border-bottom:none}
.exname{font-size:13px;font-weight:700}
.exdet{font-size:11px;color:var(--text2);margin-top:2px}
.exkg{font-size:13px;font-weight:900;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tcd{font-size:11px;color:var(--text2);margin-top:10px;padding:8px;border-radius:8px;background:var(--bg2);border-left:3px solid var(--cyan);line-height:1.7}
.rest-day{text-align:center;padding:24px 16px;color:var(--text2)}
.rest-day i{font-size:28px;margin-bottom:8px;display:block;color:var(--border)}
.rest-day p{font-size:13px}

/* SHOPPING */
.shop-trip{border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;
  background:linear-gradient(180deg,var(--bg3) 0%,var(--card) 100%)}
.strip-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.strip-title{font-size:14px;font-weight:800}
.strip-sub{font-size:11px;color:var(--text2);margin-top:2px}
.strip-body{display:none;padding:0 14px 14px}
.shop-cat{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:2px;padding:12px 0 5px;text-transform:uppercase;border-bottom:1px solid rgba(245,197,24,.15);margin-bottom:4px}
.shop-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.shop-item:last-child{border-bottom:none}
.shop-item input[type=checkbox]{width:19px;height:19px;accent-color:var(--gold);flex-shrink:0;cursor:pointer}
.shop-item label{font-size:13px;cursor:pointer;flex:1}
.shop-item.done label{text-decoration:line-through;color:var(--text2);opacity:.6}
.shop-note{font-size:11px;color:var(--text2);padding:10px 12px;background:rgba(245,197,24,.06);border-radius:10px;border:1px solid rgba(245,197,24,.15);margin-bottom:12px;line-height:1.7}

/* LOG */
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.log-card{background:var(--bg3);border-radius:12px;border:1px solid var(--border);padding:14px;
  background:linear-gradient(135deg,var(--bg3),var(--card))}
.log-card h3{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.log-stat{font-size:28px;font-weight:900;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.log-sub{font-size:11px;color:var(--text2);margin-top:2px}
.chart-wrap{border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:14px;
  background:linear-gradient(180deg,var(--bg3),var(--card))}
.chart-wrap h3{font-size:14px;font-weight:800;margin-bottom:14px}
.chart-wrap h3 i{margin-right:6px}
.inp-row{display:flex;gap:8px;margin-bottom:10px}
.inp{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--bord-g)}
.btn{padding:10px 18px;border-radius:10px;border:none;background:var(--gg);color:#000;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.btn:active{opacity:.8}
.pr-form{display:grid;gap:8px;margin-bottom:14px}
.pr-sel{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;outline:none}
.pr-table{width:100%;border-collapse:collapse;font-size:12px}
.pr-table th{text-align:left;padding:8px 6px;color:var(--text2);border-bottom:1px solid var(--border);font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.pr-table td{padding:9px 6px;border-bottom:1px solid var(--border)}
.pr-table tr:last-child td{border-bottom:none}
.pr-kg{font-weight:900;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.data-note{font-size:11px;color:var(--text2);padding:10px 12px;background:rgba(30,136,229,.07);border-radius:10px;border:1px solid rgba(30,136,229,.2);margin-bottom:12px;line-height:1.7}
.empty-state{text-align:center;padding:30px 20px;color:var(--text2);font-size:13px}

/* SUPPLEMENTS */
.supp-card{border-radius:14px;margin-bottom:10px;padding:18px;
  background:linear-gradient(135deg,var(--bg3),var(--card));
  border:1px solid var(--border);position:relative;overflow:hidden}
.supp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gg)}
.supp-icon{font-size:28px;margin-bottom:10px;display:block}
.supp-name{font-size:16px;font-weight:900;margin-bottom:4px}
.supp-when{font-size:11px;font-weight:800;margin-bottom:10px;padding:4px 10px;border-radius:8px;display:inline-block;
  background:rgba(245,197,24,.12);color:var(--gold);border:1px solid rgba(245,197,24,.25)}
.supp-desc{font-size:12px;color:var(--text2);line-height:1.8}
</style>
</head>

document.querySelectorAll('.nbtn').forEach(btn=>{

    const id=btn.dataset.sec;

    document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));

    days.push({
      name:DNAMES_HU[d],
      key:DNAMES_KEY[d],

    if(!seen[dm]){
      seen[dm]=true;
      const label=(di<6)?w.days[di].name+', '+w.days[di].dateStr+' + '+w.days[di+1].name+', '+w.days[di+1].dateStr:w.days[6].name+', '+w.days[6].dateStr;
      trips.push({dm,label});
    }
  });
  let h=`<div class="shop-note"><i class="fa fa-lightbulb" style="color:var(--gold);margin-right:6px"></i>A 2-napos ismétlő menü miatt elég kétnaponként bevásárolni. Pipáld ki amit megvettél — az alkalmazás megjegyzi! Az alapfűszerek (só, bors, olaj) nincsenek listázva.</div>`;
  trips.forEach((trip,ti)=>{
    const cats=SITEMS[trip.dm];
    h+=`<div class="shop-trip"><div class="strip-hdr" onclick="togCard(this,'strip-body')">
<div><div class="strip-title">Bevásárlás: ${ti+1}. kör</div><div class="strip-sub">${trip.label}</div></div>
<i class="fa fa-chevron-down dcaret"></i></div>
<div class="strip-body">`;
    cats.forEach(cat=>{
      h+=`<div class="shop-cat">${cat.cat}</div>`;
      cat.items.forEach(([name,qty],ii)=>{
        const key=`sh_w${cSW+1}_dm${trip.dm}_t${ti}_i${ii}`;
        const chk=localStorage.getItem(key)==='1';
        h+=`<div class="shop-item${chk?' done':''}" id="si_${key}">
<input type="checkbox" id="cb_${key}"${chk?' checked':''} onchange="chkShop('${key}',this)">
<label for="cb_${key}">${name} — <strong>${qty}</strong></label></div>`;
      });
    });
    h+=`</div></div>`;
  });
  document.getElementById('shop-content').innerHTML=h;
}
function chkShop(key,cb){
  localStorage.setItem(key,cb.checked?'1':'0');
  const row=document.getElementById('si_'+key);
  if(row) row.classList.toggle('done',cb.checked);
}

// ---- LOG ----
let wChart=null;
function renderLog(){
  const wLog=JSON.parse(localStorage.getItem('bf26_weights')||'[]');
  const prLog=JSON.parse(localStorage.getItem('bf26_prs')||'[]');
  const latestW=wLog.length?wLog[wLog.length-1].w:null;
  const startW=wLog.length?wLog[0].w:null;
  const diff=latestW&&startW?((latestW-startW).toFixed(1)):null;
  const diffColor=(diff&&parseFloat(diff)<0)?'var(--green)':'var(--coral)';
  let h=`<div class="data-note"><i class="fa fa-database" style="color:var(--cyan);margin-right:6px"></i>Az adatok a <strong>böngésző localStorage</strong>-ban tárolódnak. Kulcsok: <code>bf26_weights</code>, <code>bf26_prs</code>, <code>sh_w*_dm*_t*_i*</code>. Megmaradnak az alkalmazás bezárása után is, de böngésző-cache törléskor elvesznek.</div>
<div class="log-grid">
<div class="log-card"><h3>Aktuális súly</h3><div class="log-stat">${latestW?latestW+' kg':'—'}</div><div class="log-sub">${wLog.length} mérés rögzítve</div></div>
<div class="log-card"><h3>Változás</h3><div class="log-stat" style="${diff?'background:'+diffColor+';-webkit-background-clip:text;-webkit-text-fill-color:transparent':''}">
${diff?(parseFloat(diff)>0?'+':'')+diff+' kg':'—'}</div><div class="log-sub">${wLog.length>1?'kezdettől':'nincs elég adat'}</div></div>
</div>
<div class="chart-wrap">
<h3><i class="fa fa-weight-scale" style="color:var(--gold)"></i>Testsúly grafikon</h3>
<canvas id="wChart" style="max-height:200px"></canvas>
<div style="margin-top:14px">
<div class="inp-row">
<input class="inp" type="number" id="w-inp" placeholder="Súly kg-ban (pl. 93.5)" step="0.1" min="40" max="200">
<button class="btn" onclick="addWeight()">+ Rögzít</button>
</div>
${wLog.length?`<div style="font-size:11px;color:var(--text2)">${wLog.slice(-5).reverse().map(e=>`<span style="color:var(--text)">${e.d}: ${e.w} kg</span>`).join(' &bull; ')}</div>`:'<div style="font-size:11px;color:var(--text2)">Még nincs mérés rögzítve.</div>'}
</div>
</div>
<div class="chart-wrap">
<h3><i class="fa fa-trophy" style="color:var(--gold)"></i>Erőnléti rekordok (PR)</h3>
<div class="pr-form">
<select class="pr-sel" id="pr-ex"><option value="">— Válassz gyakorlatot —</option>
<option>Fekvenyomás</option><option>Evezés rúddal</option><option>Ülő vállnyomás</option>
<option>Lábnyomás</option><option>Bicepsz curl</option><option>Francia nyomás</option>
<option>Lat pulldown</option><option>Húzódzkodás (+ kg)</option></select>
<div class="inp-row">
<input class="inp" type="number" id="pr-kg" placeholder="Súly (kg)" step="0.5" min="1">
<input class="inp" type="number" id="pr-reps" placeholder="Isml." min="1" max="50" style="max-width:100px">
<button class="btn" onclick="addPR()">+</button>
</div>
</div>
${prLog.length?`<table class="pr-table"><thead><tr><th>Gyakorlat</th><th>Súly</th><th>Ism.</th><th>Dátum</th></tr></thead><tbody>
${prLog.slice(-15).reverse().map(p=>`<tr><td>${p.ex}</td><td class="pr-kg">${p.kg} kg</td><td style="color:var(--text2)">${p.reps}</td><td style="color:var(--text2);font-size:11px">${p.d}</td></tr>`).join('')}
</tbody></table>`:'<div class="empty-state"><i class="fa fa-trophy" style="font-size:24px;display:block;margin-bottom:8px;color:var(--border)"></i>Még nincs rögzített PR</div>'}
</div>`;
  document.getElementById('log-content').innerHTML=h;
  if(wChart){wChart.destroy();wChart=null;}
  const ctx=document.getElementById('wChart');
  if(ctx&&wLog.length>0){
    wChart=new Chart(ctx,{type:'line',data:{
      labels:wLog.map(e=>e.d),
      datasets:[{label:'Testsúly (kg)',data:wLog.map(e=>e.w),
        borderColor:'#F5C518',backgroundColor:'rgba(245,197,24,.08)',
        tension:.4,pointBackgroundColor:'#FF9800',pointRadius:5,fill:true,
        borderWidth:2}]
    },options:{responsive:true,plugins:{legend:{labels:{color:'#E8F0FE',font:{size:12}}}},
      scales:{x:{ticks:{color:'#3D6080',maxTicksLimit:6},grid:{color:'rgba(15,32,56,.8)'}},
              y:{ticks:{color:'#3D6080'},grid:{color:'rgba(15,32,56,.8)'},beginAtZero:false}}}});
  }
}
function today(){const d=new Date();return d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');}
function addWeight(){
  const v=parseFloat(document.getElementById('w-inp').value);
  if(!v||v<40||v>200){alert('40–200 kg közé ess!');return;}
  const log=JSON.parse(localStorage.getItem('bf26_weights')||'[]');
  log.push({d:today(),w:v});
  localStorage.setItem('bf26_weights',JSON.stringify(log));
  renderLog();
}
function addPR(){
  const ex=document.getElementById('pr-ex').value;
  const kg=parseFloat(document.getElementById('pr-kg').value);
  const reps=parseInt(document.getElementById('pr-reps').value);
  if(!ex||!kg||!reps){alert('Minden mezőt tölts ki!');return;}
  const log=JSON.parse(localStorage.getItem('bf26_prs')||'[]');
  log.push({ex,kg,reps,d:today()});
  localStorage.setItem('bf26_prs',JSON.stringify(log));
  renderLog();
}

// ---- SUPPLEMENTS ----
function renderSupps(){
  document.getElementById('supp-content').innerHTML=SUPPS.map(s=>`
<div class="supp-card">
<i class="fa ${s.icon} supp-icon" style="color:${s.color}"></i>
<div class="supp-name">${s.name}</div>
<div class="supp-when">${s.when}</div>
<div class="supp-desc">${s.desc}</div>
</div>`).join('');
}

// ---- TOGGLE HELPER ----
function togCard(hdr,contentClass){
  const body=hdr.parentElement.querySelector('.'+contentClass);
  if(!body) return;
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  const caret=hdr.querySelector('.dcaret');
  if(caret) caret.style.transform=open?'':'rotate(180deg)';
}

// ---- INIT ----
buildDietTabs();
renderDietContent();
buildTrainTabs();
renderTrainContent();
buildShopTabs();
renderShopContent();
renderSupps();
</script>
</body>
