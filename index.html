<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Fitness &amp; Nutrition Plan 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;--card:#181818;--border:#252525;--neon:#39FF14;--neon2:#00D4FF;--yellow:#FFD700;--text:#e8e8e8;--text2:#777;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
body{padding-bottom:72px;}
.hdr{background:var(--bg2);border-bottom:2px solid var(--neon);padding:14px 18px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
.hdr-text h1{font-size:17px;font-weight:800;color:var(--neon);letter-spacing:1px;}
.hdr-text p{font-size:11px;color:var(--text2);margin-top:2px;}
.hdr-logo{flex-shrink:0;margin-left:12px;}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nbtn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;}
.nbtn.active{color:var(--neon);}
.nbtn i{font-size:19px;display:block;}
.nbtn span{font-size:10px;display:block;margin-top:3px;}
.sec{display:none;padding:14px;}
.sec.active{display:block;}
.sec-title{font-size:21px;font-weight:800;margin-bottom:14px;}
.sec-title em{color:var(--neon);font-style:normal;}
.wtabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.wtab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;}
.wtab.active{background:var(--neon);color:#000;border-color:var(--neon);}
.dcard{background:var(--card);border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;}
.dhdr{padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.dname{font-size:15px;font-weight:700;}
.dright{display:flex;align-items:center;gap:8px;}
.dbadge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:700;}
.dbadge.edzes{background:var(--neon);color:#000;}
.dbadge.piheno{background:var(--border);color:var(--text2);}
.dkcal{font-size:13px;color:var(--neon);font-weight:700;}
.dcaret{color:var(--text2);transition:transform .25s;font-size:13px;}
.dcontent{display:none;padding:0 14px 14px;}
.mitem{background:var(--bg3);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.mhdr{padding:11px 13px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;}
.mleft h4{font-size:14px;font-weight:700;}
.mtime{font-size:11px;color:var(--text2);margin-top:1px;}
.mright{text-align:right;flex-shrink:0;margin-left:8px;}
.mkcal{font-size:14px;color:var(--neon2);font-weight:700;}
.mmacro{font-size:10px;color:var(--text2);margin-top:2px;}
.mdetail{display:none;padding:0 13px 13px;border-top:1px solid var(--border);}
.mlabel{font-size:11px;color:var(--neon);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px;}
.ing{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.ing:last-child{border:none;}
.ing-name{color:var(--text);}
.ing-amt{color:var(--text2);}
.recipe{font-size:13px;line-height:1.65;color:var(--text2);margin-top:6px;}
.dtotal{background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.3);border-radius:10px;padding:12px;margin-top:10px;}
.dtotal h5{font-size:12px;color:var(--neon);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;}
.mval{font-size:20px;font-weight:800;}
.mlbl{font-size:10px;color:var(--text2);margin-top:1px;}
.mkcol .mval{color:var(--neon);}
.mpcol .mval{color:#fff;}
.mccol .mval{color:var(--neon2);}
.mfcol .mval{color:var(--yellow);}
.pbar{background:var(--border);border-radius:3px;height:5px;margin-top:8px;overflow:hidden;}
.pfill{height:100%;background:var(--neon);border-radius:3px;}
.tw-info{font-size:13px;color:var(--text2);padding:10px 13px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--neon);margin-bottom:12px;line-height:1.5;}
.tcard{background:var(--card);border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;}
.thdr{padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.thdr h3{font-size:15px;font-weight:700;}
.ttype{font-size:11px;color:var(--neon);font-weight:700;}
.tpiheno .ttype{color:var(--text2);}
.tcontent{display:none;padding:0 14px 14px;}
.warmup,.cooldown{border-radius:8px;padding:10px 13px;margin-bottom:8px;font-size:13px;line-height:1.55;}
.warmup{background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.2);}
.cooldown{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);}
.wlbl{font-size:11px;font-weight:700;color:var(--neon);margin-bottom:4px;}
.clbl{font-size:11px;font-weight:700;color:var(--neon2);margin-bottom:4px;}
.exitem{background:var(--bg3);border-radius:10px;margin-bottom:7px;overflow:hidden;}
.exhdr{padding:11px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.exname{font-size:14px;font-weight:700;}
.exsets{font-size:12px;color:var(--neon2);font-weight:700;text-align:right;flex-shrink:0;margin-left:8px;}
.exdetail{display:none;padding:8px 13px 12px;border-top:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.6;}
.supp{background:var(--card);border-radius:14px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden;}
.supp-img{width:100%;height:160px;object-fit:contain;background:var(--bg3);padding:12px;display:block;}
.supp-ph{width:100%;height:160px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:50px;}
.supp-body{padding:14px;}
.supp-name{font-size:16px;font-weight:800;color:var(--neon);margin-bottom:3px;}
.supp-when{font-size:12px;color:var(--neon2);font-weight:600;margin-bottom:8px;}
.supp-desc{font-size:13px;color:var(--text2);line-height:1.6;}
.stag{display:inline-block;background:rgba(57,255,20,.1);border:1px solid rgba(57,255,20,.3);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--neon);margin-top:8px;margin-right:6px;}
.stag.b{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.3);color:var(--neon2);}
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text2);}
.search-in{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px 12px 38px;color:var(--text);font-size:14px;}
.search-in:focus{outline:none;border-color:var(--neon);}
.rcard{background:var(--card);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);overflow:hidden;}
.rhdr{padding:13px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.rhdr h4{font-size:14px;font-weight:700;}
.rbody{display:none;padding:0 15px 14px;}
.chevron{color:var(--text2);transition:transform .25s;font-size:13px;}
.rotated{transform:rotate(180deg);}
.tkcal{font-size:11px;color:var(--text2);}
</style>
</head>

<div id="sec-edzes" class="sec">

</div>

</div>

    <i class="fa fa-dumbbell"></i><span>Edz&eacute;s</span>
  </button>
  <button class="nbtn" onclick="showSec('kieg',this)">
    <i class="fa fa-capsules"></i><span>Kieg.</span>
  </button>
  <button class="nbtn" onclick="showSec('recept',this)">
    <i class="fa fa-book-open"></i><span>Receptek</span>
  </button>
</nav>

<script>
function showSec(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
}

let cW=0;

function swW(i){cW=i;document.querySelectorAll('#weekTabs .wtab').forEach((t,j)=>t.classList.toggle('active',j===i));renderMeals();}
function renderMeals(){
  const w=weeks[cW];
  document.getElementById('mealContent').innerHTML=w.days.map(d=>{
    const isE=d.type==='edzes';
    const ms=d.meals.map(k=>M[k]);
    let tK=ms.reduce((a,m)=>a+m.kcal,0),tP=ms.reduce((a,m)=>a+m.p,0),tC=ms.reduce((a,m)=>a+m.c,0),tF=ms.reduce((a,m)=>a+m.f,0);
    if(isE){tK+=wK;tP+=wP;}
    const pct=Math.min(Math.round(tK/2500*100),100);
    const mH=ms.map(m=>{
      const iH=m.ing.map(([n,a])=>`<div class="ing"><span class="ing-name">${n}</span><span class="ing-amt">${a}</span></div>`).join('');
      return `<div class="mitem"><div class="mhdr" onclick="tog(this)"><div class="mleft"><h4>${m.label}: ${m.name}</h4><div class="mtime">${m.time}</div></div><div class="mright"><div class="mkcal">${m.kcal} kcal</div><div class="mmacro">F:${m.p}g Sz:${m.c}g Zs:${m.f}g</div></div></div><div class="mdetail"><div class="mlabel">Hozzávalók</div>${iH}<div class="mlabel" style="margin-top:12px;">Elkészítés</div><div class="recipe">${m.recipe.replace(/\n/g,'<br>')}</div></div></div>`;

    const wH=isE?`<div class="mitem" style="border:1px solid rgba(57,255,20,.25);"><div class="mhdr" onclick="tog(this)"><div class="mleft"><h4>🥤 Whey shake (edzés után)</h4><div class="mtime">Edzés után 30 percen belül</div></div><div class="mright"><div class="mkcal" style="color:var(--neon);">${wK} kcal</div><div class="mmacro">F:${wP}g</div></div></div><div class="mdetail"><div class="mlabel">Hozzávalók</div><div class="ing"><span class="ing-name">Scitec Whey Protein por</span><span class="ing-amt">30 g</span></div><div class="ing"><span class="ing-name">Hideg víz (vagy téj)</span><span class="ing-amt">300 ml</span></div><div class="recipe">Rázópalackba töltsd a port, add hozzá a vizet, rázd össze alaposan. Azonnal idd meg.</div></div></div>`:'';
    return `<div class="dcard"><div class="dhdr" onclick="togD(this)"><div class="dname">${d.name}</div><div class="dright"><span class="dbadge ${d.type}">${isE?'EDZES':'PIHENŐ'}</span><span class="dkcal">${tK} kcal</span><i class="fa fa-chevron-down dcaret"></i></div></div><div class="dcontent">${mH}${wH}<div class="dtotal"><h5>Napi összesítő</h5><div class="mgrid"><div class="mkcol"><div class="mval">${tK}</div><div class="mlbl">kcal</div></div><div class="mpcol"><div class="mval">${tP}g</div><div class="mlbl">Fehérje</div></div><div class="mccol"><div class="mval">${tC}g</div><div class="mlbl">Szénhidrát</div></div><div class="mfcol"><div class="mval">${tF}g</div><div class="mlbl">Zsír</div></div></div><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div><div style="font-size:11px;color:var(--text2);margin-top:5px;text-align:right;">${pct}% / 2 500 kcal cél</div></div></div></div>`;
  }).join('');
}

  const tw=tWeeks[cT];
  const days=makeTrain(tw.ph);
  document.getElementById('trainContent').innerHTML=`<div class="tw-info"><strong style="color:var(--neon);">${tw.label}:</strong> ${tw.info}</div>`+days.map(d=>{
    const ip=d.type==='piheno';
    const wuH=d.wu?`<div class="warmup"><div class="wlbl">⚡ BEMELEGETÉS (5 perc)</div>${d.wu}</div>`:'';
    const exH=d.ex.map(e=>`<div class="exitem"><div class="exhdr" onclick="togEx(this)"><div class="exname">${e.n}</div><div class="exsets">${e.s} | ${e.kg}</div></div><div class="exdetail">${e.t}</div></div>`).join('');
    const cdH=d.cd?`<div class="cooldown"><div class="clbl">❄️ LEVEZETÉS (5 perc)</div>${d.cd}</div>`:'';
    return `<div class="tcard${ip?' tpiheno':''}"><div class="thdr" onclick="togT(this)"><h3>${d.day}</h3><div class="ttype">${d.focus}</div></div><div class="tcontent">${wuH}${exH}${cdH}</div></div>`;
  }).join('');
}

// ── RENDER SUPPLEMENTS ────────────────────────────────────────────────────────
function renderSupps(){
  document.getElementById('suppContent').innerHTML=supps.map(s=>{
    const imgH=s.img?`<img class="supp-img" src="${s.img}" alt="${s.name}" onerror="this.style.display='none'">`:`<div class="supp-ph">${s.emoji||'💪'}</div>`;
    const tagH=s.tags.map((t,i)=>`<span class="stag${i>0?' b':''}">${t}</span>`).join('');
    return `<div class="supp">${imgH}<div class="supp-body"><div class="supp-name">${s.name}</div><div class="supp-when"><i class="fa fa-clock" style="margin-right:5px;"></i>${s.when}</div><div class="supp-desc">${s.desc.replace(/\n/g,'<br>')}</div>${tagH}</div></div>`;
  }).join('');
}

// ── RENDER RECIPES ────────────────────────────────────────────────────────────
function renderRecipes(f=''){
  const all=Object.values(M);
  const fl=f?all.filter(m=>m.name.toLowerCase().includes(f.toLowerCase())||m.ing.some(([n])=>n.toLowerCase().includes(f.toLowerCase()))):all;
  if(!fl.length){document.getElementById('recipeList').innerHTML='<p style="color:var(--text2);text-align:center;padding:30px;">Nincs találat.</p>';return;}
  document.getElementById('recipeList').innerHTML=fl.map(m=>{
    const iH=m.ing.map(([n,a])=>`<div class="ing"><span class="ing-name">${n}</span><span class="ing-amt">${a}</span></div>`).join('');
    return `<div class="rcard"><div class="rhdr" onclick="togR(this)"><h4>${m.name}</h4><span class="tkcal">${m.kcal} kcal <i class="fa fa-chevron-down chevron"></i></span></div><div class="rbody"><div style="font-size:12px;color:var(--text2);margin-bottom:10px;">F: ${m.p}g &nbsp; Sz: ${m.c}g &nbsp; Zs: ${m.f}g</div><div class="mlabel">Hozzávalók</div>${iH}<div class="mlabel" style="margin-top:12px;">Elkészítés</div><div class="recipe">${m.recipe.replace(/\n/g,'<br>')}</div></div></div>`;
  }).join('');
}

// ── TOGGLE HELPERS ────────────────────────────────────────────────────────────
function togD(h){const c=h.nextElementSibling,o=c.style.display==='block';c.style.display=o?'none':'block';const ch=h.querySelector('.dcaret');if(ch)ch.style.transform=o?'':'rotate(180deg)';}
function tog(h){const d=h.nextElementSibling;d.style.display=d.style.display==='block'?'none':'block';}
function togT(h){const c=h.nextElementSibling;c.style.display=c.style.display==='block'?'none':'block';}
function togEx(h){const d=h.nextElementSibling;d.style.display=d.style.display==='block'?'none':'block';}
function togR(h){const b=h.nextElementSibling,ch=h.querySelector('.chevron'),o=b.style.display==='block';b.style.display=o?'none':'block';if(ch)ch.classList.toggle('rotated',!o);}

document.getElementById('searchIn').addEventListener('input',function(){renderRecipes(this.value.trim());});

renderWeekTabs();renderMeals();renderTrainWeekTabs();renderTrain();renderSupps();renderRecipes();
</script>
